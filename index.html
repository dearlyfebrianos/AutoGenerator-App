<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="src/assets/autogenerator-logo.png" />
    <link rel="apple-touch-icon" href="src/assets/autogenerator-logo.png" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color untuk Android -->
    <meta name="theme-color" content="#4F46E5" />

    <!-- Ikon fallback -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Untuk iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AutoGen" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoGen - App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((reg) => console.log("SW registered:", reg))
            .catch((err) => console.log("SW failed:", err));
        });
      }
    </script>
  </body>
</html>
